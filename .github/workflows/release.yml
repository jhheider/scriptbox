name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild binaries"
        required: true
permissions:
  contents: write
jobs:
  release:
    uses: jhheider/rust-ci/.github/workflows/release.yml@v1
    with:
      bin-name: scriptbox
      tag: ${{ github.event.inputs.tag }}
      # POSIX-only: musl (linux) + darwin, no Windows.
      include-files: "README.md LICENSE-MIT LICENSE-APACHE"
      # Homebrew tap is on; crates.io is intentionally deferred (publish-crates
      # stays off / default) until we decide to claim the crates.io name.
      tap-repo: jhheider/homebrew-tap
      tap-formula: Formula/scriptbox.rb
      targets: |
        {"include": [
          {"os":"ubuntu-latest","target":"x86_64-unknown-linux-musl","asset":"scriptbox-linux-x86_64.tar.gz"},
          {"os":"ubuntu-latest","target":"aarch64-unknown-linux-musl","asset":"scriptbox-linux-aarch64.tar.gz"},
          {"os":"macos-latest","target":"x86_64-apple-darwin","asset":"scriptbox-macos-x86_64.tar.gz"},
          {"os":"macos-latest","target":"aarch64-apple-darwin","asset":"scriptbox-macos-aarch64.tar.gz"}
        ]}
    secrets: inherit
