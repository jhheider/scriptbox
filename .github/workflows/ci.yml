name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: jhheider/rust-ci/.github/workflows/ci.yml@v1
    with:
      # Private repo: everything runs on the self-hosted arm64 Linux runner
      # (free), which exercises the memfd path. The macOS `/dev/fd`
      # open-then-unlink path is covered by local testing for now; add
      # "macos-latest" back to `os` once hosted Actions minutes are available.
      os: '["self-hosted"]'
      runs-on: self-hosted
      coverage: true
    secrets: inherit
