name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]
  pull_request:
    paths-ignore: ["**.md", "LICENSE*", ".gitignore"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: jhheider/rust-ci/.github/workflows/ci.yml@v1
    with:
      # POSIX only: Linux (memfd path) + macOS (/dev/fd open-then-unlink path),
      # no Windows. Public repo => free hosted runners.
      os: '["ubuntu-latest","macos-latest"]'
      coverage: true
    secrets: inherit
